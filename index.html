<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextoFeed</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

.post {
    background: #1c1c1c;
    margin-bottom: 12px;
    padding: 16px;
    border-radius: 10px;
}

.quote {
    font-size: 18px;
    margin-bottom: 10px;
}

.author {
    font-size: 14px;
    color: #aaa;
}

.category {
    font-size: 12px;
    color: #4caf50;
    margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="container" id="feed"></div>

<script>

async function getQuote() {
    try {
        const res = await fetch("https://api.quotable.io/random");
        const data = await res.json();

        return {
            text: data.content,
            author: data.author,
            category: "Cita"
        };

    } catch (e) {
        return {
            text: "Error cargando cita online",
            author: "Sistema",
            category: "Error"
        };
    }
}

function createPost(post) {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
        <div class="category">${post.category}</div>
        <div class="quote">"${post.text}"</div>
        <div class="author">— ${post.author}</div>
    `;

    return div;
}

async function loadPosts(count = 5) {
    const feed = document.getElementById("feed");

    for (let i = 0; i < count; i++) {
        const post = await getQuote();
        feed.appendChild(createPost(post));
    }
}

window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
        loadPosts(3);
    }
});

loadPosts(10);

</script>

</body>
</html>
